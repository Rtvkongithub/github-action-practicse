name: CICD

on:
  workflow_dispatch:

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        run: echo "Cloning the code"

  build:
  needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Build using Docker
        run: echo "Build using Docker"

  test:
  needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Testing the code
        run: echo "Testing the code"

  deploy:
  needs: [build,test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy the code
        run: echo "Deploying the code"
